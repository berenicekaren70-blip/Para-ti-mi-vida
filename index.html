<style>

body{
margin:0;

background:white;

}

/* corazones */
.corazon{
position:fixed;
color:pink;
font-size:12px;
animation: flotar 8s linear infinite;
opacity:0.7;
}

@keyframes flotar{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

/* botones */
.menu{
padding:20px;
}

button{
background:#ffb6c1;
color:white;
border:none;
padding:12px 25px;
margin:5px;
border-radius:20px;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
}

button:active{
transform:scale(0.9);
}

/* contenido */
#contenido{
padding:20px;
}

/* galeria */
.galeria img{
width:220px;
margin:10px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>
</head>
